kind = "web"
previewPath = "/"
title = "GFN Bot Manager"
version = "1.0.0"
id = "artifacts/gfn-bots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21971

[services.development]
run = "pnpm --filter @workspace/gfn-bots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gfn-bots", "run", "build" ]
publicDir = "artifacts/gfn-bots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21971"
BASE_PATH = "/"
